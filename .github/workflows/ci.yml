name: CI
on:
  push:
  pull_request:
jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: '3.12'}
      - run: pip install -e '.[dev,postgres,queue,storage]'
      - run: ruff check apps packages scripts tests
      - run: ruff format --check apps packages scripts tests
      - run: mypy apps packages
      - run: PYTHONPATH=.:apps/api pytest -q --cov=apps/api --cov=packages
      - run: PYTHONPATH=.:apps/api python scripts/verification/verify_e2e.py
      - run: PYTHONPATH=.:apps/api alembic upgrade head
  frontend:
    runs-on: ubuntu-latest
    defaults: {run: {working-directory: apps/web}}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: {node-version: 22, cache: npm, cache-dependency-path: apps/web/package-lock.json}
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
  containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker build -f apps/api/Dockerfile .
      - run: docker build -f apps/worker/Dockerfile .
      - run: docker build -f apps/web/Dockerfile .
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - uses: gitleaks/gitleaks-action@v2
      - uses: anchore/scan-action@v5
        with: {path: '.', fail-build: false, severity-cutoff: high}
