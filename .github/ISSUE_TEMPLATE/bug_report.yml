name: Bug report
description: Report a reproducible problem in MotionForge 3D.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: "Thanks for helping improve MotionForge 3D. Please use synthetic data and remove any secrets or private media."
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Include commands, endpoint calls, or UI steps.
      placeholder: |
        1. Run ...
        2. Open ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: "OS, Python, Node, Docker, browser"
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove credentials, tokens, private media, and personal data.
      render: shell
